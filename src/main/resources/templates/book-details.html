<!DOCTYPE html>
<html>
<head>
    <title th:text="${book.title}">Book Details</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body th:attr="data-page-context=${book.title}">

<nav>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/books/add">Add Book</a>
    <a href="/upload">Upload RDF</a>
    <a href="/graph">RDF Graph</a>
</nav>

<main>
    <h1 th:text="${book.title}">Book title</h1>

    <p><strong>Author:</strong> <span th:text="${book.author}">Author</span></p>
    <p><strong>Reading level:</strong> <span th:text="${book.readingLevel}">Level</span></p>

    <p><strong>Themes:</strong></p>
    <ul>
        <li th:each="theme : ${book.themes}" th:text="${theme}">Theme</li>
    </ul>

    <h2>Change Reading Level</h2>

    <form th:action="@{'/books/' + ${book.id} + '/reading-level'}" method="post">
        <select name="readingLevel">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <button type="submit">Update</button>
    </form>

    <p>
        <a href="/books">Back to books</a>
    </p>
</main>

<script src="/chatbot.js"></script>
</body>
</html>
