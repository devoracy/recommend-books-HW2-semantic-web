<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-page-context="books-list">

<nav>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/books/add">Add Book</a>
    <a href="/upload">Upload RDF</a>
    <a href="/graph">RDF Graph</a>
</nav>

<main>
    <h1>Available Books</h1>

    <div class="book-list">
        <div class="book-card" th:each="book : ${books}">
            <h2 th:text="${book.title}">Book title</h2>
            <p><strong>Author:</strong> <span th:text="${book.author}">Author</span></p>
            <p><strong>Reading level:</strong> <span th:text="${book.readingLevel}">Level</span></p>

            <a th:href="@{'/books/' + ${book.id}}">View details</a>
        </div>
    </div>
</main>

<script src="/chatbot.js"></script>
</body>
</html>
