<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-page-context="add-book">

<nav>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/books/add">Add Book</a>
    <a href="/upload">Upload RDF</a>
    <a href="/graph">RDF Graph</a>
</nav>

<main>
    <h1>Add a New Book</h1>

    <form action="/books/add" method="post" class="form">
        <label>Title</label>
        <input type="text" name="title" value="Harry Potter" required>

        <label>Author</label>
        <input type="text" name="author" value="Gigel" required>

        <label>Themes, separated by comma</label>
        <input type="text" name="themes" value="Fantasy, Adventure" required>

        <label>Reading Level</label>
        <select name="readingLevel">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <button type="submit">Add Book</button>
    </form>
</main>

<script src="/chatbot.js"></script>
</body>
</html>
