<!DOCTYPE html>
<html>
<head>
    <title>RDF Graph</title>
    <link rel="stylesheet" href="/style.css">

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body data-page-context="rdf-graph">

<nav>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/books/add">Add Book</a>
    <a href="/upload">Upload RDF</a>
    <a href="/graph">RDF Graph</a>
</nav>

<main>
    <h1>RDF Graph Visualization</h1>

    <p>This graph is generated from the RDF triples loaded with Apache Jena.</p>

    <div id="graph"></div>
</main>

<script>
    fetch('/api/graph')
        .then(response => response.json())
        .then(data => {
            const nodes = new vis.DataSet(
                data.nodes.map(node => ({
                    id: node.id,
                    label: node.label
                }))
            );

            const edges = new vis.DataSet(
                data.edges.map(edge => ({
                    from: edge.from,
                    to: edge.to,
                    label: edge.label,
                    arrows: 'to'
                }))
            );

            const container = document.getElementById('graph');

            const graphData = {
                nodes: nodes,
                edges: edges
            };

            const options = {
                nodes: {
                    shape: 'box',
                    margin: 10
                },
                edges: {
                    font: {
                        align: 'middle'
                    }
                },
                physics: {
                    stabilization: true
                }
            };

            new vis.Network(container, graphData, options);
        });
</script>

<script src="/chatbot.js"></script>
</body>
</html>
